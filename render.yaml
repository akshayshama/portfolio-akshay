databases:
  - name: bankflow
    plan: free
    region: oregon

services:
  - type: web
    name: bankflow-server
    plan: free
    region: oregon
    runtime: node
    buildCommand: cd server && npm install && npx prisma generate && npm run build
    startCommand: cd server && npm run db:push && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bankflow
          property: connectionString
      - key: JWT_SECRET
        value: bankflow-secret-key-2024
      - key: PORT
        value: 3001
    repo: https://github.com/akshayshama/bankflow.git

  - type: web
    name: bankflow-client
    plan: free
    region: oregon
    runtime: node
    buildCommand: cd client && npm install && npm run build
    startCommand: cd client && npm run preview -- --host
    envVars:
      - key: VITE_API_URL
        value: https://bankflow-server.onrender.com
    repo: https://github.com/akshayshama/bankflow.git