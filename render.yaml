services:
  - type: web
    name: bankflow-db
    plan: free
    postgres:
      - name: bankflow
        plan: free

  - type: web
    name: bankflow-server
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bankflow
          property: connectionString
      - key: JWT_SECRET
        value: bankflow-secret-key-2024
      - key: PORT
        value: 3001

  - type: web
    name: bankflow-client
    plan: free
    buildCommand: npm run build
    startCommand: npm run preview
    envVars:
      - key: VITE_API_URL
        value: https://bankflow-server.onrender.com