version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: bankflow
      POSTGRES_PASSWORD: bankflow123
      POSTGRES_DB: bankflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://bankflow:bankflow123@db:5432/bankflow
      JWT_SECRET: bankflow-secret-key-2024
      PORT: 3001
    depends_on:
      - db
    command: sh -c "npx prisma generate && npx prisma db push && npm run dev"

  client:
    build: ./client
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3001

volumes:
  postgres_data: